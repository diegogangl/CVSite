        # details = "Aenean commodo ligula eget dolor."
        # [[params.experience.list.items]]
        # details = "Etiam ultricies nisi vel augue."

        [[params.experience.list]]
        title = "UX Design/Developer"
        dates = "2021 - Present"
        company = "Astraios"
        details = "My role at Astraios involves design, code, and maintenance for the administrative dashboard, the customer app, and the internal guards utility. I developed the first iteration of these applications in React and React Native, and I am currently porting them to Flutter to improve maintainability and performance."

        [[params.experience.list]]
        title = "Python Developer"
        dates = "2014 - Present"
        company = "Freelance"
        details = "My experience includes developing servers using Flask/Bottle and scripting for Blender (simple scripts, drivers, and addons). I've also worked on automated pipelines (from base model to 3D print), consulting and reviewing, generation and render of objects and scenes through code, as well as importing lesser-known file formats into Blender. "

        [[params.experience.list]]
        title = "3D Artist"
        dates = "2014 - 2020"
        company = "Freelance"
        details = "My work was based on Blender and involved an educational VR project, motion graphics, and templates for scientific visualization."

        [[params.experience.list]]
        title = "Web Designer/Developer"
        dates = "2009 - 2015"
        company = "Freelance"
        details = "I developed for Wordpress, Drupal, Joomla, as well as some static websites. My work involved setup, design, and theme development."

        [[params.experience.list]]
        title = "Junior Graphic/Web Designer"
        dates = "2008 - 2010"
        company = "Ambiente3"
        details = "I worked as a general graphic designer first, while later focusing on web design. I worked on Flash-based websites, a custom CMS, and a larger site with Google Maps integration."



    [params.projects]
        enable = true

        [[params.projects.list]]
        title = "Render+"
        meta = "Open Source (Commercial)"
        tagline = "A commercial Blender add-on to make rendering easier. It provides features for regular renders, such as shutting down the PC after rendering, as well as batch rendering. It allows users to queue render jobs, set custom options for each, and even override any datablock in the scene with a simple GUI."
        url = "//superhivemarket.com/products/render"
        link = "Product Page"

        [[params.projects.list]]
        title = "GTG"
        meta = "Open Source"
        tagline = "Task organization application for the GNOME desktop, written in Python with GTK4. I took over as the code maintainer in late 2019. Afterwards, I finished the migration to Gtk3, a transition to lxml and a cleaner file format. Currently finishing a complete rewrite of the core logic along with a migration to GTK4."
        url = "//github.com/getting-things-gnome/gtg"
        link = "Github Repo"

        [[params.projects.list]]
        title = "Pangu"
        meta = "Open Source"
        tagline = "Terrain Generation engine using fractal noise with support for hydraulic and thermal erosion. Written in Rust and exposed as a Python module through PyO3. It was used in a Blender add-on called Mirage. I've discontinued the add-on but I'm keeping the engine public as study material for others."
        url = "//github.com/diegogangl/Pangu"
        link = "Github Repo"




