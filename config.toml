    [params.summary]
        enable = true
        text = "Hi! I am a graphic designer and developer. Over the years, I've worked on graphic design, web design, 3D modelling/lighting, Python scripting, and more recently, mobile development. While user interfaces have always been my passion and focus, I've also worked on backends such as HTTP/WebSocket servers, geometric algorithms for 3D processing/generations, as well as glue code for libraries. I consider myself a quick learner and fast to adapt."


    [params.experience]
        enable = true

        [[params.experience.list]]
        title = "Blender Addon Developer"
        dates = "2018 - 2026"
        company = "Virtamed"
        details = "I worked on custom tools for the 3D modelers in the team. This includes code to generate and analyze tetrameshes, generating vertex groups for specific scenarios, and importing/exporting custom file formats. I also created interfaces for geometric libraries (from C to Python), and my last project was a custom nodes system to automate exporting to a proprietary engine."
        # [[params.experience.list.items]]
        # details = "Lorem ipsum dolor sit amet, consectetuer."
