        [[params.projects.list]]
        title = "Render+"
        meta = "Open Source (Commercial)"
        tagline = "A commercial Blender addon to make rendering easier. It provides features for regular renders, like shutting down the PC after rendering, as well as batch rendering. It allows users to queue render jobs, set custom options for each, and even override any datablock in the scene with a simple GUI."
        url = "//superhivemarket.com/products/render"
        link = "Product Page"

        [[params.projects.list]]
        title = "GTG"
        meta = "Open Source"
        tagline = "Task organization application for the Gnome desktop, written in Python using GTK4. I took over in XXXX as the code maintainer. Afterwards I finished the migration to Gtk3, a transition to lxml and a cleaner file format. Currently finishing a complete rewrite of the core logic along with a migration to Gtk4."
        url = "//github.com/getting-things-gnome/gtg"
        link = "Github Repo"

        [[params.projects.list]]
        title = "Pangu"
        meta = "Open Source"
        tagline = "Terrain Generation engine using fractal noise with support for hydraulic and thermal erosion. Written in Rust and exposed as Python module using PyO3. It was used in a Blender addon called Mirage. I've discontinued the addon as I didn't have time to maintain it, but I kept the engine public as study material for others."
        url = "//github.com/diegogangl/Pangu"
        link = "Github Repo"




